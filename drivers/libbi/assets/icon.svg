<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg version="1.1" viewBox="0 0 375 575" width="375" height="575" xmlns="http://www.w3.org/2000/svg">
  <g fill="none" stroke="#000000" stroke-linecap="round" stroke-linejoin="round">
    <!-- unit body -->
    <rect x="60" y="30" width="255" height="515" rx="10" stroke-width="7" />
    <!-- side rails -->
    <line x1="94" y1="30" x2="94" y2="545" stroke-width="3.5" />
    <line x1="281" y1="30" x2="281" y2="545" stroke-width="3.5" />
    <!-- round control panel: bezel, screen, buttons -->
    <circle cx="187.5" cy="127" r="40" stroke-width="6" />
    <rect x="167" y="107" width="41" height="24" rx="4" stroke-width="4" />
    <circle cx="175" cy="145" r="4" stroke-width="3" />
    <circle cx="187.5" cy="145" r="4" stroke-width="3" />
    <circle cx="200" cy="145" r="4" stroke-width="3" />
    <!-- logo band -->
    <line x1="60" y1="222" x2="315" y2="222" stroke-width="5" />
    <line x1="60" y1="302" x2="315" y2="302" stroke-width="5" />
    <!-- single flash mark in band -->
    <path d="M 196 234 L 172 268 h 15 l -10 24 l 26 -34 h -15 l 8 -24 z" stroke-width="6" />
    <!-- battery module pill -->
    <rect x="176" y="385" width="23" height="72" rx="11.5" stroke-width="5" />
    <circle cx="187.5" cy="443" r="5" stroke-width="3.5" />
  </g>
  <g fill="#000000" stroke="none">
    <!-- LED dots in pill -->
    <circle cx="187.5" cy="397" r="2.5" />
    <circle cx="187.5" cy="407" r="2.5" />
    <circle cx="187.5" cy="417" r="2.5" />
    <circle cx="187.5" cy="427" r="2.5" />
  </g>
  <!-- vertical libbi wordmark on the band, right side -->
  <text x="300" y="262" font-family="Helvetica, Arial, sans-serif" font-size="30" letter-spacing="1" fill="#000000" text-anchor="middle" transform="rotate(-90 300 262)">libbi</text>
