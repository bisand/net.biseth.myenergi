<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg version="1.1" viewBox="0 0 375 575" width="375" height="575" xmlns="http://www.w3.org/2000/svg">
  <g fill="none" stroke="#000000" stroke-linecap="round" stroke-linejoin="round">
    <!-- unit body -->
    <rect x="60" y="30" width="255" height="515" rx="10" stroke-width="7" />
    <!-- side rails -->
    <line x1="94" y1="30" x2="94" y2="545" stroke-width="3.5" />
    <line x1="281" y1="30" x2="281" y2="545" stroke-width="3.5" />
    <!-- display panel: rounded square with screen and buttons -->
    <rect x="149" y="88" width="77" height="77" rx="18" stroke-width="6" />
    <rect x="163" y="102" width="49" height="30" rx="4" stroke-width="4" />
    <circle cx="172" cy="147" r="4.5" stroke-width="3.5" />
    <circle cx="187.5" cy="147" r="4.5" stroke-width="3.5" />
    <circle cx="203" cy="147" r="4.5" stroke-width="3.5" />
    <!-- logo band -->
    <line x1="60" y1="222" x2="315" y2="222" stroke-width="5" />
    <line x1="60" y1="302" x2="315" y2="302" stroke-width="5" />
    <!-- myenergi double flash -->
    <path d="M 184 236 l -19 30 h 15 l -19 30" stroke-width="7" />
    <path d="M 214 236 l -19 30 h 15 l -19 30" stroke-width="7" />
    <!-- module split -->
    <line x1="60" y1="424" x2="315" y2="424" stroke-width="3.5" />
    <!-- battery module pill 1 -->
    <rect x="176" y="330" width="23" height="72" rx="11.5" stroke-width="5" />
    <circle cx="187.5" cy="388" r="5" stroke-width="3.5" />
    <!-- battery module pill 2 -->
    <rect x="176" y="452" width="23" height="72" rx="11.5" stroke-width="5" />
    <circle cx="187.5" cy="510" r="5" stroke-width="3.5" />
  </g>
  <g fill="#000000" stroke="none">
    <!-- LED dots in pills -->
    <circle cx="187.5" cy="342" r="2.5" />
    <circle cx="187.5" cy="352" r="2.5" />
    <circle cx="187.5" cy="362" r="2.5" />
    <circle cx="187.5" cy="372" r="2.5" />
    <circle cx="187.5" cy="464" r="2.5" />
    <circle cx="187.5" cy="474" r="2.5" />
    <circle cx="187.5" cy="484" r="2.5" />
    <circle cx="187.5" cy="494" r="2.5" />
  </g>
  <!-- vertical libbi wordmark on the band, right side -->
  <text x="300" y="262" font-family="Helvetica, Arial, sans-serif" font-size="30" letter-spacing="1" fill="#000000" text-anchor="middle" transform="rotate(-90 300 262)">libbi</text>
</svg>
