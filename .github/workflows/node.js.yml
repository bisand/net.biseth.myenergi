name: Node.js CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        # CI runs build tooling only; the app itself targets the Node
        # versions provided by Homey firmware (16 on older 2016-2019
        # firmware, 22 as of Homey v12.9.0).
        node-version: [22.x]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: package-lock.json

    - run: npm ci

    - run: npm run build --if-present
    - run: npm run lint
    - run: npm test
